http:
  middlewares:

    public-chain:
      chain:
        middlewares:
          - gzip
          - security-headers
          - redirect-to-https

    infra-chain:
      chain:
        middlewares:
          - gzip
          - security-headers
          - traefik-auth

    gzip:
      compress: {}
    
    redirect-to-https:
      redirectScheme:
        scheme: https

    security-headers:
      headers:
        frameDeny: true
        contentTypeNosniff: true
        referrerPolicy: "same-origin"
    
    traefik-auth:
      basicAuth:
        users:
          - '{{ env "SVC_DASHBOARD_HASH" }}'

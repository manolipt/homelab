---
services:
  postgres:
    image: postgres:18.3
    container_name: postgres
    env_file:
      - .env
    volumes:
      - ${SVC_POSTGRES_DIR}:/var/lib/postgresql
    ports:
      - "5432:5432"
    networks:
      - postgres
      - backend

  pgadmin:
    image: dpage/pgadmin4
    env_file:
      - .env
    depends_on:
      - postgres
    networks:
      - traefik
      - backend
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.pgadmin.rule=Host(`pgadmin.internal`)"
      - "traefik.http.routers.pgadmin.entrypoints=web"
      - "traefik.http.routers.pgadmin.middlewares=infra-chain@file"
      - "traefik.http.services.pgadmin.loadbalancer.server.port=80"

volumes:
  pgadmin_data:
    name: pgadmin_data
    driver: local

networks:
  traefik:
    external: true
  postgres:
    name: postgres
    driver: bridge
  backend:
    driver: bridge

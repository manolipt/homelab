# Pihole Compose File
# More info at https://github.com/pi-hole/docker-pi-hole/ and https://docs.pi-hole.net/
# Capabilities notes: https://github.com/pi-hole/docker-pi-hole#note-on-capabilities
services:
  pihole:
    container_name: pihole
    image: pihole/pihole:latest
    networks:
      - frontend
    ports:
      - "53:53/tcp"
      - "53:53/udp"
      - "5353:80/tcp"
    environment:
      TZ: 'America/Los_Angeles'
      WEBPASSWORD: ${WEB_PASSWORD}
    labels:
      # Traefik setup below can be used for local access, if you have a local DNS server running (e.g. pihole).
      # Make sure to add the appropriate DNS record to match this if you end up using it.
      - "traefik.enable=true"
      - "traefik.http.routers.pihole.rule=Host(`pihole.local`)"
      - "traefik.http.routers.pihole.entrypoints=web"
      - "traefik.http.services.pihole.loadbalancer.server.port=80"
      - "traefik.http.middlewares.pihole-redirect.redirectregex.regex=^https?://(.*)/$$"
      - "traefik.http.middlewares.pihole-redirect.redirectregex.replacement=$$1/admin"
      - "traefik.http.routers.pihole.middlewares=pihole-redirect"
    volumes:
      - './etc-pihole:/etc/pihole'
      - './etc-dnsmasq.d:/etc/dnsmasq.d'
    restart: unless-stopped
    env_file:
      - .env

networks:
  frontend:
    external: true
